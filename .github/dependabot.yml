version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: '@pandacss/*'
        versions: ['>=1.10.0']
      # ESLint 10 dropped context.getFilename(); eslint-plugin-react,
      # eslint-plugin-import, and eslint-plugin-jsx-a11y still call the old API.
      # Hold the ESLint major until the plugin ecosystem ships v10 support.
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']
      - dependency-name: '@eslint/js'
        update-types: ['version-update:semver-major']
      # `@types/node` must track the runtime pinned by `engines.node` and
      # `.nvmrc` (Node 24 today). Major bumps are coordinated with the runtime
      # upgrade, not driven by Dependabot.
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']
    groups:
      react:
        patterns: ['react', 'react-dom', '@types/react*']
      radix:
        patterns: ['@radix-ui/*']
      base-ui:
        patterns: ['@base-ui-components/*']
      panda:
        patterns: ['@pandacss/*']
      next-stack:
        patterns:
          - 'next'
          - '@next/*'
          - 'fumadocs-core'
          - 'fumadocs-ui'
      storybook:
        patterns: ['storybook', '@storybook/*']
      testing:
        patterns: ['vitest', '@testing-library/*', 'vitest-axe']
      dev-dependencies:
        dependency-type: development
        update-types: ['minor', 'patch']
      dev-dependencies-major:
        dependency-type: development
        update-types: ['major']
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: ci
