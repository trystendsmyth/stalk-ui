name: Feature request
description: Suggest a component, CLI feature, preset capability, or docs improvement
title: 'feat: '
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user need or limitation does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the desired behavior or API.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: accessibility
    attributes:
      label: Accessibility considerations
      description: Note keyboard, screen reader, contrast, motion, or RTL implications.
