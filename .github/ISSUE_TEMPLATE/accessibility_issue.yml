name: Accessibility issue
description: Report an accessibility problem or regression
title: 'a11y: '
labels: ['accessibility']
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What accessibility problem did you encounter?
    validations:
      required: true
  - type: dropdown
    id: impact
    attributes:
      label: Impact area
      options:
        - Keyboard navigation
        - Screen reader output
        - Focus management
        - Color contrast
        - Reduced motion
        - RTL or localization
        - Other
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include steps, assistive technology, browser, and OS details.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected accessible behavior
    validations:
      required: true
