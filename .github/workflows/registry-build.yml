name: Registry Build

on:
  pull_request:
    paths:
      - 'packages/components/**'
      - 'packages/utils/**'
      - 'registry/**'
      - 'public/r/**'
      - 'scripts/build-registry.ts'
  push:
    branches: [main]
    paths:
      - 'packages/components/**'
      - 'packages/utils/**'
      - 'registry/**'
      - 'public/r/**'
      - 'scripts/build-registry.ts'

permissions:
  contents: read

jobs:
  registry-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:registry
      - run: git diff --exit-code public/r public/_headers
