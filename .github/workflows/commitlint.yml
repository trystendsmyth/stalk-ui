name: Commitlint

# Validates pull request titles and commit messages against
# `commitlint.config.mjs`. Uses the `pull_request` trigger (NOT
# `pull_request_target`) and processes only API payloads — no checkout, no
# install, no execution of untrusted PR code — so this workflow cannot be
# turned into an exfiltration vector by a malicious fork.

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-pr-title:
    name: validate PR title
    runs-on: ubuntu-latest
    steps:
      - name: Validate Conventional Commit format
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          # Allowed types are kept in sync with commitlint.config.mjs.
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert|a11y)(\([a-z0-9.-]+\))?!?: .+'
          if ! [[ "$PR_TITLE" =~ $PATTERN ]]; then
            echo "::error title=Invalid PR title::PR titles must follow Conventional Commits."
            echo ""
            echo "Got:    $PR_TITLE"
            echo "Format: <type>(<optional scope>): <subject>"
            echo "Types:  feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert, a11y"
            exit 1
          fi
          echo "PR title OK: $PR_TITLE"
