packages:
  - 'packages/*'
  - 'apps/*'

allowBuilds:
  esbuild: true
  odiff-bin: true
  puppeteer: false
  sharp: true

overrides:
  # ajv pulls fast-uri transitively (via @modelcontextprotocol/sdk in the docs
  # app); pin past the path-traversal / host-confusion advisories (GHSA-q3j6-
  # qgpj-74h6, GHSA-v39h-62p7-jpjc). ajv's range already allows the patch.
  fast-uri: '>=3.1.2'

catalog:
  react: ^19.0.0
  react-dom: ^19.0.0
  '@types/react': ^19.0.0
  '@types/react-dom': ^19.0.0
  typescript: ^5.9.3
  '@pandacss/dev': 1.9.1
  '@pandacss/types': 1.9.1
  lucide-react: ^1.14.0
  vitest: ^4.1.5
  '@testing-library/react': ^16.1.0
  '@testing-library/user-event': ^14.5.0
  '@testing-library/jest-dom': ^6.6.0
  vitest-axe: ^0.1.0
  storybook: ^10.3.6
